name: Test

on:
  push:
    branches: [prod]
  pull_request:
    branches: [prod]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Format check
        run: pnpm format

      - name: Type check and lint
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
